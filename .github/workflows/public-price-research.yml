name: Public Price Research

on:
  workflow_dispatch:
  push:
    branches: [research-public-price]
    paths:
      - scripts/research_public_price.py
      - .github/workflows/public-price-research.yml
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  analyze:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research-public-price
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install DuckDB
        run: python -m pip install --disable-pip-version-check duckdb
      - name: Download official 2025 nationwide file
        run: |
          mkdir -p tmp research_output/public_price_2025
          curl --fail --location --retry 20 --retry-all-errors --retry-delay 5 \
            --continue-at - --connect-timeout 30 --max-time 3600 \
            --speed-time 120 --speed-limit 1024 \
            --user-agent 'Mozilla/5.0 public-price-research' \
            'https://www.data.go.kr/cmm/cmm/fileDownload.do?atchFileId=FILE_000000003525375&fileDetailSn=1&insertDataPrcus=N' \
            --output tmp/public_price_2025.zip
          ls -lh tmp/public_price_2025.zip
          python - <<'PY' > research_output/public_price_2025/download_check.log 2>&1
          import zipfile
          p='tmp/public_price_2025.zip'
          with zipfile.ZipFile(p) as z:
              print([(i.filename, i.file_size) for i in z.infolist()])
          PY
      - name: Analyze Q1-Q4 and capture diagnostics
        id: analysis
        continue-on-error: true
        run: |
          set +e
          sed -i 's/count(\*) groups/count(*) group_count/g' scripts/research_public_price.py
          python scripts/research_public_price.py > research_output/public_price_2025/analysis.log 2>&1
          code=$?
          echo "$code" > research_output/public_price_2025/exit_code.txt
          tail -n 120 research_output/public_price_2025/analysis.log
          exit $code
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: public-price-2025-results
          path: research_output/public_price_2025
          retention-days: 7
      - name: Commit results or diagnostics
        if: ${{ always() && github.event_name == 'push' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add research_output/public_price_2025
          git commit -m 'Add public-price research output [skip ci]' || exit 0
          git push origin HEAD:research-public-price
      - name: Fail when analysis failed
        if: ${{ steps.analysis.outcome == 'failure' }}
        run: exit 1
