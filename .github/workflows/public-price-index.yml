name: Public Price Legal-Dong Index

on:
  workflow_dispatch:
  push:
    branches: [research-public-price]
    paths:
      - scripts/extract_public_price_index.py
      - .github/workflows/public-price-index.yml

permissions:
  contents: write

jobs:
  index:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research-public-price
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check duckdb
      - name: Download official nationwide file
        run: |
          mkdir -p tmp research_output/public_price_2025
          curl --fail --location --retry 20 --retry-all-errors --retry-delay 5 \
            --continue-at - --connect-timeout 30 --max-time 3600 \
            --speed-time 120 --speed-limit 1024 \
            --user-agent 'Mozilla/5.0 public-price-index' \
            'https://www.data.go.kr/cmm/cmm/fileDownload.do?atchFileId=FILE_000000003525375&fileDetailSn=1&insertDataPrcus=N' \
            --output tmp/public_price_2025.zip
      - name: Build legal-dong population index
        run: python scripts/extract_public_price_index.py
      - uses: actions/upload-artifact@v4
        with:
          name: public-price-legal-dong-index
          path: |
            research_output/public_price_2025/legal_dong_counts.csv
            research_output/public_price_2025/legal_dong_index_metadata.json
          retention-days: 7
      - name: Commit index
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add research_output/public_price_2025/legal_dong_counts.csv research_output/public_price_2025/legal_dong_index_metadata.json
          git commit -m 'Add legal-dong population index [skip ci]' || exit 0
          git push origin HEAD:research-public-price
