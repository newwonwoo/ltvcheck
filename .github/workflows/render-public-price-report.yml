name: Render Public Price Report

on:
  workflow_dispatch:
  push:
    branches: [research-public-price]
    paths:
      - scripts/render_public_price_key_results.py
      - .github/workflows/render-public-price-report.yml

permissions:
  contents: write

jobs:
  render:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research-public-price
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/render_public_price_key_results.py
      - name: Commit report
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add research_output/public_price_2025/vworld_sample/key_results.json \
                  research_output/public_price_2025/vworld_sample/research_report.md
          git commit -m 'Add compact public-price research report [skip ci]' || exit 0
          git push origin HEAD:research-public-price
